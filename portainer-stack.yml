version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-maintenance_dashboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    networks:
      - maintenance_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - maintenance_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKER_IMAGE:-maintenance_dashboard:latest}
    build:
      context: https://github.com/${GITHUB_REPO:-your-username/maintenance-dashboard}.git
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py createcachetable &&
             gunicorn --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-3} maintenance_dashboard.wsgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DB_NAME=${DB_NAME:-maintenance_dashboard}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - STATIC_URL=/static/
      - MEDIA_URL=/media/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maintenance_network
    restart: unless-stopped
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-true}"
      - "traefik.http.routers.maintenance-web.rule=Host(`${DOMAIN:-maintenance.local}`)"
      - "traefik.http.routers.maintenance-web.tls=${TLS_ENABLE:-false}"
      - "traefik.http.routers.maintenance-web.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.maintenance-web.loadbalancer.server.port=8000"

  celery:
    image: ${DOCKER_IMAGE:-maintenance_dashboard:latest}
    build:
      context: https://github.com/${GITHUB_REPO:-your-username/maintenance-dashboard}.git
      dockerfile: Dockerfile
    command: celery -A maintenance_dashboard worker --loglevel=${CELERY_LOG_LEVEL:-info}
    volumes:
      - media_volume:/app/media
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DB_NAME=${DB_NAME:-maintenance_dashboard}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maintenance_network
    restart: unless-stopped

  celery-beat:
    image: ${DOCKER_IMAGE:-maintenance_dashboard:latest}
    build:
      context: https://github.com/${GITHUB_REPO:-your-username/maintenance-dashboard}.git
      dockerfile: Dockerfile
    command: celery -A maintenance_dashboard beat --loglevel=${CELERY_LOG_LEVEL:-info}
    volumes:
      - celerybeat_data:/app/celerybeat-schedule
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DB_NAME=${DB_NAME:-maintenance_dashboard}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maintenance_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - nginx_config:/etc/nginx/conf.d
    environment:
      - NGINX_ENVSUBST_TEMPLATE_DIR=/etc/nginx/templates
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
      - BACKEND_HOST=web
      - BACKEND_PORT=8000
    depends_on:
      - web
    networks:
      - maintenance_network
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    configs:
      - source: nginx_conf
        target: /etc/nginx/templates/default.conf.template

networks:
  maintenance_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  celerybeat_data:
    driver: local
  nginx_config:
    driver: local

configs:
  nginx_conf:
    content: |
      upstream django {
          server ${BACKEND_HOST}:${BACKEND_PORT};
      }
      
      server {
          listen 80;
          server_name ${DOMAIN:-_};
          client_max_body_size 100M;
          
          location /static/ {
              alias /var/www/static/;
              expires 30d;
              add_header Cache-Control "public, immutable";
          }
          
          location /media/ {
              alias /var/www/media/;
              expires 7d;
              add_header Cache-Control "public";
          }
          
          location / {
              proxy_pass http://django;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_redirect off;
          }
      }